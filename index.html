// =============================================================================
//  Parser: extract structured info from stack traces
// =============================================================================

/**
 * Parse a stack trace string into structured data.
 * Supports Python traceback, JavaScript/Node stack, and generic formats.
 */
function parseStackTrace(text) {
  if (!text || !text.trim()) return null;

  const lines = text.split(/\r?\n/);
  const result = {
    errorType: null,      // e.g. "TypeError", "AttributeError"
    errorMessage: null,   // the message after the error type
    errorRaw: null,       // the full error line
    frames: [],           // { file, line, func, code }
    unknownFormat: true,
  };

  // --- Try Python traceback format ---
  // Pattern: File "path", line N, in <func>
  // Pattern:     code_line
  // Pattern: ErrorType: message
  const pyFileRe = /^\s*File\s+"([^"]+)",\s+line\s+(\d+)(?:,\s+in\s+(.+))?/;
  const pyCodeRe = /^\s{2,}(.+)$/;
  const pyErrorRe = /^(\w+(?:Error|Exception|Warning|Interrupt|Exit|Error|Fault)):\s*(.*)/;

  let i = 0;
  // Skip "Traceback (most recent call last):" header
  if (lines[0] && /^Traceback/i.test(lines[0])) i++;

  const pyFrames = [];
  while (i < lines.length) {
    const m = lines[i].match(pyFileRe);
    if (m) {
      const frame = { file: m[1], line: parseInt(m[2]), func: m[3] || null, code: null };
      i++;
      // Next line might be the code line (indented)
      if (i < lines.length) {
        const cm = lines[i].match(pyCodeRe);
        if (cm && !pyErrorRe.test(lines[i]) && !pyFileRe.test(lines[i])) {
          frame.code = cm[1].trim();
          i++;
        }
      }
      pyFrames.push(frame);
    } else {
      const em = lines[i].match(pyErrorRe);
      if (em) {
        result.errorType = em[1];
        result.errorMessage = em[2];
        result.errorRaw = lines[i];
        result.unknownFormat = false;
        i++;
        continue;
      }
      // Also match standalone error without file frames
      const em2 = lines[i].match(pyErrorRe);
      if (em2 && pyFrames.length === 0) {
        // Might be a simple error line
        result.errorType = em2[1];
        result.errorMessage = em2[2];
        result.errorRaw = lines[i];
        result.unknownFormat = false;
      }
      i++;
    }
  }
  if (pyFrames.length > 0 || result.errorType) {
    result.frames = pyFrames;
    result.unknownFormat = !result.errorType && pyFrames.length === 0;
  }

  // --- Try JavaScript/Node stack format ---
  // Pattern: at funcName (file:line:col)
  // Pattern: at file:line:col
  // Pattern: ErrorType: message
  const jsAtRe = /^\s*at\s+(?:(.+?)\s+\()?(.+?):(\d+)(?::\d+)?\)?/;
  const jsErrorRe = /^(\w+(?:Error|Exception)):\s*(.*)/;
  // Also: "ReferenceError: x is not defined" style
  const jsErrorLineRe = /^(\w+(?:Error|Exception)):\s*(.*)/;

  if (result.unknownFormat || result.frames.length === 0) {
    const jsFrames = [];
    let jsErrorType = null, jsErrorMessage = null, jsErrorRaw = null;

    for (let j = 0; j < lines.length; j++) {
      const atM = lines[j].match(jsAtRe);
      if (atM) {
        jsFrames.push({
          file: atM[2],
          line: parseInt(atM[3]),
          func: atM[1] || null,
          code: null,
        });
        continue;
      }
      const errM = lines[j].match(jsErrorRe);
      if (errM) {
        jsErrorType = errM[1];
        jsErrorMessage = errM[2];
        jsErrorRaw = lines[j];
        continue;
      }
    }

    if (jsFrames.length > 0 || jsErrorType) {
      result.frames = jsFrames.length > 0 ? jsFrames : result.frames;
      if (jsErrorType) {
        result.errorType = jsErrorType;
        result.errorMessage = jsErrorMessage;
        result.errorRaw = jsErrorRaw;
      }
      result.unknownFormat = false;
    }
  }

  // --- Fallback: scan for any error pattern ---
  if (!result.errorType) {
    for (const line of lines) {
      const m = line.match(/^(\w+(?:Error|Exception))(?::\s*(.*))?/i);
      if (m) {
        result.errorType = m[1];
        result.errorMessage = m[2] || '';
        result.errorRaw = line;
        result.unknownFormat = false;
        break;
      }
    }
  }

  // --- Fallback: scan for file:line patterns ---
  if (result.frames.length === 0) {
    for (const line of lines) {
      const m = line.match(/(?:^|\s)(?:at\s+)?([\w\/\.-]+\.(?:py|js|ts|jsx|tsx|go|rs|java|cpp|c|rb|php|swift|kt))(?::(\d+))?/);
      if (m) {
        result.frames.push({ file: m[1], line: m[2] ? parseInt(m[2]) : null, func: null, code: null });
        result.unknownFormat = false;
      }
    }
  }

  return result;
}

// Error type → funny nicknames
const ERROR_NICKNAMES = {
  TypeError: "类型侠",
  AttributeError: "属性幽灵",
  NameError: "无名氏",
  SyntaxError: "语法警察",
  ReferenceError: "虚空行者",
  IndexError: "越界狂魔",
  KeyError: "钥匙大盗",
  ValueError: "价值审判官",
  ImportError: "失踪模块",
  ZeroDivisionError: "数学毁灭者",
  RangeError: "范围刺客",
  ENOENT: "文件消失术",
};

/**
 * Generate a roast from parsed stack trace data.
 * @param {Object} parsed - result from parseStackTrace()
 * @param {number} seed - for variety (0, 1, 2, ...)
 * @returns {string} roast text
 */
function generateRoast(parsed, seed) {
  if (!parsed) return "🤔 嗯...你确定你贴的是堆栈信息吗？啥也解析不出来啊！\n\n要不你检查一下：是不是贴错了？还是说你根本没报错，只是想找我聊天？🙃";

  // Normalize seed
  const s = (seed || 0) % 100;

  // Pick functions (seeded pseudo-random)
  const pick = (arr) => arr[s % arr.length];
  const pickBy = (arr, seedOffset) => arr[(s + seedOffset) % arr.length];

  const lines = [];

  // Opening
  if (s < 4) {
    lines.push(pick(OPENINGS));
  } else if (s < 6) {
    lines.push(pick(EPIC_OPENINGS));
  } else {
    lines.push(pick(OPENINGS));
  }
  lines.push("━".repeat(36));

  // If format unrecognized
  if (parsed.unknownFormat && !parsed.errorType && parsed.frames.length === 0) {
    lines.push("");
    lines.push("不是...你贴的这是啥啊？？我左看右看上看下看，愣是没看出这是个堆栈！！😤");
    lines.push("");
    lines.push("你确定你复制的是报错信息？而不是随便复制了一段代码来逗我？？");
    lines.push("人家等了半天就等着吐槽你的报错呢，结果你给我看这个？？");
    lines.push("连个正经的堆栈都贴不好！！你是不是在摸鱼！！🐟");
    lines.push("");
    lines.push("💡 正确姿势：复制终端里那堆红红的、看着就让人血压升高的报错信息，然后贴过来！");
    return lines.join("\n");
  }

  // If has some frames but no error type
  if (!parsed.errorType && parsed.frames.length > 0) {
    lines.push("");
    lines.push("诶？解析出了一些文件信息，但没找到错误类型...你是不是只贴了一半？🤨");
    lines.push("不管了，先看看这些文件在搞什么幺蛾子！");
  }

  // Error type roast
  if (parsed.errorType) {
    lines.push("");
    const et = parsed.errorType;
    let nick = ERROR_NICKNAMES[et] || "神秘bug";

    // Special handling for JS "Cannot read properties of undefined"
    let effectiveType = et;
    if (et === 'TypeError' && parsed.errorMessage && /cannot read properties of undefined/i.test(parsed.errorMessage)) {
      effectiveType = 'CannotReadPropertiesOfUndefined';
    } else if (et === 'TypeError' && parsed.errorMessage && /cannot read properties of null/i.test(parsed.errorMessage)) {
      effectiveType = 'CannotReadPropertiesOfNull';
    }

    const roasts = ERROR_ROASTS[effectiveType] || ERROR_ROASTS[et];
    if (roasts) {
      lines.push(pick(roasts));
    } else {
      lines.push(`啊哈！是 **${et}**！外号「${nick}」！虽然这个错误类型不常见，但不妨碍我吐槽你！😏`);
      lines.push(`${et} 什么的，一听名字就知道不对劲！你又在搞什么骚操作？？🤨`);
    }
  }

  // File/line roasts (first frame or most relevant)
  const primaryFrame = parsed.frames[0];
  if (primaryFrame && primaryFrame.file && primaryFrame.line) {
    lines.push("");
    lines.push(pick(FILE_LINE_ROASTS)
      .replace(/\{file\}/g, `**${primaryFrame.file}**`)
      .replace(/\{line\}/g, `**${primaryFrame.line}**`));
  }

  // Additional frames
  if (parsed.frames.length > 1) {
    lines.push("");
    lines.push("调用链一路追溯上去：");
    for (let i = 1; i < Math.min(parsed.frames.length, 4); i++) {
      const f = parsed.frames[i];
      const loc = f.file + (f.line ? `:${f.line}` : '');
      const who = f.func || '某个函数';
      lines.push(`  ⬆️ 第${i+1}层：**${who}** @ ${loc} — 这个也在调用链上，一个都别想跑！👆`);
    }
  }

  // Code / variable roast
  if (primaryFrame && primaryFrame.code) {
    const code = primaryFrame.code;
    lines.push("");
    lines.push(pick(CODE_ROASTS).replace(/\{code\}/g, `\`${code}\``));

    // Try to extract variable names
    const varNames = extractVarNames(code);
    if (varNames.length > 0) {
      const v = pick(varNames);
      lines.push("");
      lines.push(pick(VAR_ROASTS).replace(/\{var\}/g, `**${v}**`));
    }
  }

  // Variable from error message
  if (parsed.errorMessage) {
    // Try extract variable names from error message
    const msgVars = extractVarNames(parsed.errorMessage);
    const relevantVars = msgVars.filter(v =>
      !['object', 'attribute', 'properties', 'undefined', 'null', 'none', 'property'].includes(v.toLowerCase())
    );
    if (relevantVars.length > 0) {
      const v = pick(relevantVars);
      const alreadyRoasted = primaryFrame && primaryFrame.code && extractVarNames(primaryFrame.code).includes(v);
      if (!alreadyRoasted) {
        lines.push("");
        lines.push(pick(VAR_ROASTS).replace(/\{var\}/g, `**${v}**`));
      }
    }

    // Error message roast
    lines.push("");
    const shortMsg = parsed.errorMessage.length > 120
      ? parsed.errorMessage.substring(0, 120) + '...'
      : parsed.errorMessage;
    lines.push(pick(MESSAGE_ROASTS).replace(/\{msg\}/g, `\`${shortMsg}\``));
  }

  // Extra sass for common patterns
  if (parsed.errorMessage) {
    const msg = parsed.errorMessage.toLowerCase();
    if (msg.includes('none') || msg.includes('null') || msg.includes('undefined')) {
      lines.push("");
      lines.push(pick([
        "看到 'None'/'null'/'undefined' 我就血压飙升！判空！判空！判空！重要的事情说三遍！！🤬",
        "又是不判空！！你写代码的习惯是不是跟金鱼学的，7秒就忘？？🐠",
        "空值检查了解一下？`if x is not None` / `if (x != null)` 很难写吗？？很难吗！！😤",
      ]));
    }
    if (msg.includes('not defined') || msg.includes('is not defined')) {
      lines.push("");
      lines.push(pick([
        "「not defined」！你用了没定义的东西！你是不是把变量名写错了？还是忘了声明？？🤔",
        "未定义就使用？这跟在沙漠里找游泳池有什么区别！🏜️",
      ]));
    }
    if (msg.includes('cannot find module') || msg.includes('no module')) {
      lines.push("");
      lines.push(pick([
        "找不到模块！你是不是又忘了 `pip install` / `npm install` 了？依赖没装好就开始跑？心也太大了吧！📦",
        "模块失踪案！建议立即执行 `pip install` 或 `npm install` 寻回失踪模块！🕵️",
      ]));
    }
  }

  // Closing
  lines.push("");
  if (s % 3 === 0) {
    lines.push(pick(SASSY_CLOSINGS));
  } else {
    lines.push(pick(CLOSINGS));
  }

  return lines.join("\n");
}

/**
 * Extract potential variable/function names from code/message text.
 */
function extractVarNames(text) {
  if (!text) return [];
  const names = [];
  // Match identifiers: word.word or standalone identifiers
  const re = /\b([a-zA-Z_$][\w$]*(?:\.[a-zA-Z_$][\w$]*)*)\b/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const name = m[1];
    // Filter out common keywords and short names
    const skip = new Set([
      'if','else','for','while','do','in','of','is','as','at','to','by','on','no','or','and','not',
      'true','false','none','null','undefined','this','new','var','let','const','function','return',
      'class','import','from','export','default','try','catch','throw','finally','typeof','instanceof',
      'file','line','module','object','attribute','property','properties','type','error','exception',
      'has','was','the','are','can','be','an','it','we','you','i','a','s','t','n',
      'reading','cannot','read','most','recent','call','last','traceback','what','main',
      'get','set','run','init','print','log',
    ]);
    if (!skip.has(name.toLowerCase()) && name.length >= 2 && !/^\d+$/.test(name)) {
      names.push(name);
    }
  }
  // Deduplicate
  return [...new Set(names)];
}

//  State
// =============================================================================

let lastParsed = null;
let roastSeed = 0;

// =============================================================================
//  UI Functions
// =============================================================================

function doRoast() {
  const input = document.getElementById('inputArea').value;
  const outputBox = document.getElementById('outputBox');
  const btnAnother = document.getElementById('btnAnother');
  const btnCopy = document.getElementById('btnCopy');
  const statsBar = document.getElementById('statsBar');

  if (!input.trim()) {
    outputBox.classList.add('empty');
    outputBox.innerHTML = '喂！！你倒是贴个堆栈进来啊！！<br>上面那个大框框不是摆设好吗！！😤<br><br>⬆️ 把报错信息贴到左边的框里再点按钮！';
    btnAnother.style.display = 'none';
    btnCopy.style.display = 'none';
    statsBar.style.display = 'none';
    return;
  }

  lastParsed = parseStackTrace(input);
  roastSeed = 0;

  const roast = generateRoast(lastParsed, roastSeed);

  outputBox.classList.remove('empty');
  outputBox.innerHTML = roast;
  btnAnother.style.display = 'inline-flex';
  btnCopy.style.display = 'inline-flex';

  // Stats
  if (lastParsed.frames.length > 0 || lastParsed.errorType) {
    statsBar.style.display = 'flex';
    document.getElementById('statLines').textContent = lastParsed.frames.length;
    document.getElementById('statError').textContent = lastParsed.errorType || '未知';
  }

  // Scroll output to top
  outputBox.scrollTop = 0;
}

function doAnotherVersion() {
  if (!lastParsed) return;
  roastSeed++;
  const roast = generateRoast(lastParsed, roastSeed);
  const outputBox = document.getElementById('outputBox');
  outputBox.classList.remove('empty');
  outputBox.innerHTML = roast;
  outputBox.scrollTop = 0;
}

function doCopy() {
  const outputBox = document.getElementById('outputBox');
  const text = outputBox.textContent;
  if (!text || outputBox.classList.contains('empty')) {
    showToast('还没有吐槽内容可以复制哦~ 😅');
    return;
  }

  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ 已复制！快去发给你的冤种同事吧！');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制！');
  });
}

function doClear() {
  document.getElementById('inputArea').value = '';
  const outputBox = document.getElementById('outputBox');
  outputBox.classList.add('empty');
  outputBox.innerHTML = '等待你的报错投喂中... 🍿<br>贴好堆栈，点击下方大红按钮！';
  document.getElementById('btnAnother').style.display = 'none';
  document.getElementById('btnCopy').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  lastParsed = null;
  roastSeed = 0;
}

function loadExample(type) {
  const examples = {
    python: `Traceback (most recent call last):
  File "app.py", line 42, in <module>
    print(user.name)
AttributeError: 'NoneType' object has no attribute 'name'`,
    js: `TypeError: Cannot read properties of undefined (reading 'name')
    at getUser (src/utils.js:15:22)
    at processUser (src/main.js:42:10)
    at Object.<anonymous> (src/index.js:8:5)`,
  };
  document.getElementById('inputArea').value = examples[type] || '';
  showToast(`📥 已加载 ${type === 'python' ? 'Python' : 'JavaScript'} 示例！`);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

//  Keyboard shortcut
// =============================================================================

document.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + Enter to roast
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    doRoast();
  }
});

document.getElementById('btnAnother').style.display = 'none';
